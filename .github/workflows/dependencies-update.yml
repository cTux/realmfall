name: Dependencies Update

on:
  schedule:
    - cron: '59 5 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the head commit of the branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Use pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.33.2

      - name: Use node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Installing dependencies
        run: pnpm i --no-frozen-lockfile

      - name: Updating minor dependencies and running sanity checks
        run: pnpm run update:minor -- --no-commit

      - name: Dependencies audit
        run: pnpm audit --json

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Refresh dependency branch lease target
        run: |
          if git ls-remote --exit-code --heads origin dependencies-update > /dev/null 2>&1; then
            git fetch origin dependencies-update:refs/remotes/origin/dependencies-update
          fi

      - name: Create or update dependency pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add package.json pnpm-lock.yaml

          if git diff --cached --quiet; then
            echo "No dependency changes to publish."
            exit 0
          fi

          git checkout -B dependencies-update
          git commit -m "chore(dependencies): automatic updates"

          gh auth setup-git
          git push --force-with-lease origin HEAD:dependencies-update

          existing_pr_number="$(gh pr list --base main --head dependencies-update --json number --jq '.[0].number')"

          if [ -n "$existing_pr_number" ]; then
            gh pr edit "$existing_pr_number" \
              --title "chore(dependencies): automatic updates" \
              --body "Automated dependency updates."
          else
            gh pr create \
              --base main \
              --head dependencies-update \
              --title "chore(dependencies): automatic updates" \
              --body "Automated dependency updates."
          fi
