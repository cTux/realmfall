name: Dependencies Update

on:
  schedule:
    - cron: '59 5 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the head commit of the branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Use pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b
        with:
          version: 10.33.0

      - name: Use node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Installing dependencies
        run: pnpm i --no-frozen-lockfile

      - name: Updating dependencies
        run: pnpm run update:minor

      - name: Dependencies audit
        run: pnpm audit --json

      - name: Installing dependencies
        run: pnpm i

      - name: Running ESLint
        run: pnpm run lint

      - name: Running Vitest
        run: pnpm run test

      - name: Running Build
        run: pnpm run build

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Refresh dependency branch lease target
        run: |
          if git ls-remote --exit-code --heads origin dependencies-update > /dev/null 2>&1; then
            git fetch origin dependencies-update:refs/remotes/origin/dependencies-update
          fi

      - name: Create or update dependency pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add package.json pnpm-lock.yaml

          if git diff --cached --quiet; then
            echo "No dependency changes to publish."
            exit 0
          fi

          git checkout -B dependencies-update
          git commit -m "chore(dependencies): automatic updates"

          gh auth setup-git
          git push --force-with-lease origin HEAD:dependencies-update

          existing_pr_number="$(gh pr list --base main --head dependencies-update --json number --jq '.[0].number')"

          if [ -n "$existing_pr_number" ]; then
            gh pr edit "$existing_pr_number" \
              --title "chore(dependencies): automatic updates" \
              --body "Automated dependency updates."
          else
            gh pr create \
              --base main \
              --head dependencies-update \
              --title "chore(dependencies): automatic updates" \
              --body "Automated dependency updates."
          fi
