name: Dependencies Update

on:
  schedule:
    - cron: '59 5 * * *'

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the head commit of the branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Use pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b
        with:
          version: 10.33.0

      - name: Use node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Installing dependencies
        run: pnpm i --no-frozen-lockfile

      - name: Updating dependencies
        run: pnpm run update:minor

      - name: Dependencies audit
        run: pnpm audit --json

      - name: Installing dependencies
        run: pnpm i

      - name: Running ESLint
        run: pnpm run lint

      - name: Running Vitest
        run: pnpm run test

      - name: Running Build
        run: pnpm run build

      - name: Run command
        uses: ctux/simple-pull-request-gh-action@3521ae6c8c845bba3ea4486ff36bc36688634037
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch_main_name: "'master'"
          branch_pr_name: "'dependencies-update'"
          commit_message: "'chore(dependencies): automatic updates'"
