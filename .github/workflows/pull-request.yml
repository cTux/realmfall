name: Pull Request

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/copilot-instructions.md'
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/copilot-instructions.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  test-node:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Vitest cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .tests/vitest-cache
          key: >-
            vitest-cache-${{ runner.os }}-${{ hashFiles(
              'pnpm-lock.yaml',
              'package.json',
              'packages/client/vite.config.ts',
              'packages/client/tsconfig.json',
              'packages/client/tsconfig.node.json',
              'packages/client/src/test/setup.node.ts',
              'packages/client/src/test/setup.shared.ts',
              'packages/client/src/test/setup.ts'
            ) }}
          restore-keys: |
            vitest-cache-${{ runner.os }}-

      - name: Run node test project
        run: pnpm test:node

  test-jsdom:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Vitest cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .tests/vitest-cache
          key: >-
            vitest-cache-${{ runner.os }}-${{ hashFiles(
              'pnpm-lock.yaml',
              'package.json',
              'packages/client/vite.config.ts',
              'packages/client/tsconfig.json',
              'packages/client/tsconfig.node.json',
              'packages/client/src/test/setup.node.ts',
              'packages/client/src/test/setup.shared.ts',
              'packages/client/src/test/setup.ts'
            ) }}
          restore-keys: |
            vitest-cache-${{ runner.os }}-

      - name: Run jsdom test project
        run: pnpm test:jsdom

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with strict bundle budget
        run: pnpm build:budget:strict
