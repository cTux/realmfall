name: Changelog

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update generated changelog for new version
        run: pnpm changelog:release

      - name: Commit changelog update
        run: |
          if git diff --quiet -- CHANGELOG.md docs/changelog/releases.json docs/changelog/unreleased.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md docs/changelog/releases.json docs/changelog/unreleased.json
          git commit -m "docs(changelog): publish release notes for $(node --input-type=module -e \"import { readFileSync } from 'node:fs'; console.log(JSON.parse(readFileSync('package.json', 'utf8')).version);\")"
          git push
